# Production Nginx Configuration for Deployr (EC2 Host)
# Place or symlink into /etc/nginx/sites-available/deployr and enable via sites-enabled

server {
    listen 80;
    server_name deployr.yourdomain.com;

    # Root pointing to the built production SPA dist folder
    root /home/ubuntu/vercel-clone/apps/frontend/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static Assets Cache Control
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
    }

    # Frontend Single Page Application Routing (fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Express API Reverse Proxy (Routes: /deploy, /deployment, /deployments, /projects, /status, /auth, /me, /logout)
    location ~ ^/(deploy|deployment|deployments|projects|status|auth|me|logout) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
