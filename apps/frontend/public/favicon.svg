<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="deployr-grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="deployr-grad-inner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.85" />
    </linearGradient>
    <filter id="deployr-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Background Container -->
  <rect width="36" height="36" rx="9" fill="#09090B" />
  <rect x="0.5" y="0.5" width="35" height="35" rx="8.5" stroke="rgba(255, 255, 255, 0.15)" />

  <!-- Outer Shield Field -->
  <path
    d="M18 3L33 11.5V24.5L18 33L3 24.5V11.5L18 3Z"
    fill="url(#deployr-grad-main)"
    opacity="0.2"
  />

  <!-- Outer Folded Delta Wing -->
  <path
    d="M18 5L31 28L18 23L5 28L18 5Z"
    fill="url(#deployr-grad-main)"
  />

  <!-- Inner High-Contrast Thrust Core -->
  <path
    d="M18 10.5L24.5 23.5L18 20.5L11.5 23.5L18 10.5Z"
    fill="url(#deployr-grad-inner)"
  />

  <!-- Glowing Production Apex Node -->
  <circle cx="18" cy="8.5" r="2.2" fill="#38BDF8" filter="url(#deployr-glow)" />
  <circle cx="18" cy="8.5" r="1.2" fill="#FFFFFF" />
</svg>